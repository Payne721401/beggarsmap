name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ============================================================
  # Workers API：型別檢查 + 單元測試（coverage 100%）
  # ============================================================
  api-test:
    name: API Unit Tests (100% Coverage)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npm run type-check

      - name: Run unit tests with coverage
        run: npm run test:coverage

      - name: Upload coverage to GitHub Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-coverage
          path: apps/api/coverage/

  # ============================================================
  # Next.js Web：單元測試（chains / reports / favorites 100% coverage）
  # ============================================================
  web-test:
    name: Web Unit Tests (100% Coverage)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Run unit tests with coverage
        run: npm run test:coverage

      - name: Upload coverage to GitHub Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: web-coverage
          path: apps/web/coverage/

  # ============================================================
  # Next.js Web：型別檢查 + build check
  # ============================================================
  web-build:
    name: Web TypeScript & Build Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies (root for workspace hoisting)
        working-directory: .
        run: npm install

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Next.js build check
        run: npm run build
        env:
          NEXT_PUBLIC_IMG_HOST: https://img.beggarsmap.tw
          NEXT_PUBLIC_R2_HOST: https://img.beggarsmap.tw
          NEXT_PUBLIC_API_URL: https://api.beggarsmap.tw

  # ============================================================
  # 部署：僅在 main branch push 時執行
  # ============================================================
  deploy-api:
    name: Deploy Workers API
    runs-on: ubuntu-latest
    needs: [api-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    defaults:
      run:
        working-directory: apps/api

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Deploy to Cloudflare Workers
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-web:
    name: Deploy Next.js to Cloudflare Pages
    runs-on: ubuntu-latest
    needs: [web-build, web-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        working-directory: .
        run: npm install

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_IMG_HOST: https://img.beggarsmap.tw
          NEXT_PUBLIC_R2_HOST: https://img.beggarsmap.tw
          NEXT_PUBLIC_API_URL: https://api.beggarsmap.tw
          NEXT_PUBLIC_CF_ANALYTICS_TOKEN: ${{ secrets.CF_ANALYTICS_TOKEN }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy .next --project-name=beggarsmap
          workingDirectory: apps/web
